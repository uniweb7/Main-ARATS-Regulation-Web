        });
        
        const save = () => {
            if(!form.title) return alert("Feature title is required.");
            let all = DB.getDynamicFeatures() || [];
            if(editFeatureGlobal) {
                all = all.map(f => f.id === form.id ? form : f);
            } else {
                all.push(form);
            }
            DB.saveDynamicFeatures(all); 
            refresh(); 
            setView('feature_list');
        };

        const remove = () => {
            if(!confirm("Delete this feature permanently?")) return;
            let all = DB.getDynamicFeatures() || [];
            all = all.filter(f => f.id !== form.id);
            DB.saveDynamicFeatures(all); 
            refresh(); 
            setView('feature_list');
        };

        return (
            <div className="min-h-screen bg-[#f8fafc] p-4 md:p-6 pb-24 font-sans text-slate-800 flex flex-col no-print">
                <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-6 bg-white p-4 shadow-sm rounded-3xl border border-slate-200 sticky top-0 z-10">
                    <div className="flex items-center gap-3 w-full md:w-auto">
                        <button onClick={() => setView('feature_list')} className="p-2 bg-indigo-50 text-indigo-700 rounded-full hover:bg-indigo-100 transition"><Icons.Back /></button>
                        <div>
                            <h2 className="text-xl font-black text-slate-800 leading-tight">{editFeatureGlobal ? 'Edit' : 'Create'} Feature</h2>
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Web Component Builder</p>
                        </div>
                    </div>
                    <div className="flex gap-3 w-full md:w-auto">
                        {editFeatureGlobal && <button onClick={remove} className="px-5 py-2.5 text-red-600 bg-red-50 font-black text-xs uppercase rounded-xl hover:bg-red-100 transition shadow-sm border border-red-200 flex-1 md:flex-none flex items-center justify-center"><Icons.Trash /></button>}
                        <button onClick={save} className="px-8 py-2.5 text-white bg-indigo-600 font-black text-xs uppercase tracking-widest rounded-xl shadow-md hover:bg-indigo-700 flex items-center justify-center gap-2 flex-1 md:flex-none transition hover:scale-105"><Icons.Save /> SAVE CODE</button>
                    </div>
                </div>

                <div className="bg-white p-6 md:p-8 rounded-3xl shadow-lg border border-slate-200 flex-1 flex flex-col gap-6 max-w-6xl mx-auto w-full three-d-box">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">Feature Title</label>
                            <input className="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl font-black text-sm outline-none focus:border-indigo-500 transition shadow-inner" placeholder="e.g. Exam Countdown Banner" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} />
                        </div>
                        <div>
                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">Injection Location</label>
                            <select className="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl font-bold text-sm outline-none focus:border-indigo-500 transition shadow-inner cursor-pointer" value={form.location} onChange={e=>setForm({...form, location: e.target.value})}>
                                <optgroup label="Dashboard">
                                    <option>Dashboard Top</option>
                                </optgroup>
                                <optgroup label="Reports & Trackers">
                                    <option>Weekly Report Top</option>
                                    <option>Weekly Report Middle</option>
                                    <option>Weekly Report Bottom</option>
                                    <option>Monthly Report Top</option>
                                    <option>Monthly Report Middle</option>
                                    <option>Monthly Report Bottom</option>
                                    <option>Protocol Tracker Top</option>
                                    <option>Protocol Tracker Middle</option>
                                    <option>Protocol Tracker Bottom</option>
                                </optgroup>
                                <optgroup label="Management & Rules">
                                    <option>Management System Top</option>
                                    <option>Management System Middle</option>
                                    <option>Management System Bottom</option>
                                    <option>Finance Protocol Top</option>
                                    <option>Finance Protocol Middle</option>
                                    <option>Finance Protocol Bottom</option>
                                    <option>Leave Protocol Top</option>
                                    <option>Leave Protocol Middle</option>
                                    <option>Leave Protocol Bottom</option>
                                    <option>Bank Detail Top</option>
                                    <option>Amendments Top</option>
                                    <option>Constitutional Rules Top</option>
                                    <option>Constitutional Rules Bottom</option>
                                    <option>Constitution Top</option>
                                    <option>Constitution Middle</option>
                                    <option>Constitution Bottom</option>
                                    <option>Rule Book Top</option>
                                    <option>Rule Book Middle</option>
                                    <option>Rule Book Bottom</option>
                                    <option>Ordinance Top</option>
                                    <option>Ordinance Middle</option>
                                    <option>Ordinance Bottom</option>
                                </optgroup>
                            </select>
                        </div>
                    </div>
                    
                    <div className="flex-1 border-4 border-slate-800 rounded-2xl overflow-hidden flex flex-col relative mt-2 shadow-lg">
                        <div className="bg-slate-900 text-white px-5 py-3 flex justify-between items-center border-b border-slate-700">
                            <span className="text-[10px] font-black uppercase tracking-widest flex items-center gap-2"><Icons.Code /> HTML / Tailwind Editor</span>
                        </div>
                        <textarea className="w-full bg-slate-950 text-green-400 font-mono text-sm p-6 flex-1 outline-none resize-none shadow-inner leading-relaxed custom-scrollbar" value={form.code} onChange={e=>setForm({...form, code: e.target.value})} spellCheck="false"></textarea>
                    </div>

                    <div className="border border-slate-200 rounded-2xl p-6 bg-slate-50 shadow-inner mt-2">
                        <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 border-b border-slate-200 pb-2">Live Preview Render</h4>
                        <div className="pointer-events-none opacity-90 transition-all duration-300">
                            <div dangerouslySetInnerHTML={{ __html: form.code || '' }} />
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // =========================================================================
    // MAIN APP ROUTER & INITIALIZATION
    // =========================================================================
    
    const MainApp = () => {
        const { view, showRoutineViewer, showRoutineMaker, setView } = useContext(AppContext);
        
        // Dynamic router map
        const renderView = () => {
            switch (view) {
                // Core Features
                case 'entry': return <EntryScreen />;
                case 'dashboard': return <Dashboard />;
                case 'activity': return <ActivityForm />;
                case 'week': return <WeeklyView />;
                case 'month': return <MonthView />;
                
                // Constitutional Suite & AI
                case 'integrity_dashboard': return <ConstitutionalRulesDashboard />;
                case 'constitution_v2': return <ConstitutionV2 />;
                case 'rule_book': return <RuleBook />;
                case 'ordinance': return <Ordinance />;
                case 'ai_parliament': return <AIParliament />;
                case 'ai_supreme_court': return <AISupremeCourt />;
                case 'ai_executive': return <AIExecutive />;
                case 'enemy_ladder': return <EnemyLadder />;
                case 'good_ladder': return <GoodLadder />;
                
                // Trackers & Management 
                case 'protocol_tracker': return <ProtocolTracker />;
                case 'management_system': return <ManagementSystem />;
                
                // Management Sub-Modules
                case 'finance_protocol': return <FinanceProtocol />;
                case 'bank_sbi': return <BankDetail code="SBI" name="State Bank of India" color="bg-blue-800" onBack={()=>setView('finance_protocol')} />;
                case 'bank_bob': return <BankDetail code="BOB" name="Bank of Baroda" color="bg-orange-600" onBack={()=>setView('finance_protocol')} />;
                case 'leave_protocol': return <LeaveProtocol />;
                case 'future_amendments': return <FutureAmendments />;
                case 'answer_writing_v2': return <AnswerWritingV2 />;
                case 'notes_app': return <NotesApp />;
                case 'official_notices': return <OfficialNotices />;
                
                // Feature Engine
                case 'feature_builder': return <FeatureBuilder />;
                case 'feature_list': return <FeatureList />;
                
                // --- EXTERNAL IFRAME APPS ---
                case 'external_routine': return <ExternalApp url="index (75) (30).html" title="Elite Scholar OS" onClose={() => setView('dashboard')} />;
                case 'external_coc': return <ExternalApp url="index (75) (31).html" title="CoC Account Registry" onClose={() => setView('management_system')} />;
                
                default: return <EntryScreen />;
            }
        };

        return (
            <>
                {renderView()}
                
                {/* Global Components Rendered Automatically */}
                <GlobalHelpModule />
                <PWAInstaller />
                <DesktopModeToggle />
                <DailyMiniConstitution />
                
                {showRoutineViewer && <RoutineViewer />}
                {showRoutineMaker && <RoutineMaker />}
            </>
        );
    };

    // React Root Initialization
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
        <AppProvider>
            <MainApp />
        </AppProvider>
    );

    </script>
</body>
</html>
