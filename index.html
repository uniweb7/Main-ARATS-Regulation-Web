    // =========================================================================
    // ANALYSIS ENGINE (5-TIER V3 SYLLABUS LOGIC & APRIL VERIFICATION)
    // =========================================================================
    const AnalysisEngine = { 
        calculateScore: (dateStr, formData) => { 
            if (!formData) return { score: 0, isFail: false, failReasons: ["No Data"], mixedScoreInfo: null }; 

            const isLegacy = dateStr < '2026-05-16';
            const dayType = formData.dayType || 'Normal';
            const activityMode = formData.activityMode || 'Normal';
            
            const currentSyllabus = getSyllabusForDate(dateStr, dayType, activityMode); 
            
            let mandatoryFailed = false, failReasons = []; 
            const dayOfMonth = new Date(dateStr).getDate(); 
            const isException = dayOfMonth === LEGAL_CONFIG.SELF_CONTROL_HIDDEN_DAY; 

            const processBlock = (syllabusBlock) => {
                let blockScore = 0;
                let blockWeight = 0;
                syllabusBlock.forEach(t => { 
                    if (isException && (t.id === 'self_control' || t.id === 'act_12' || t.id === 'n_self')) return; 
                    blockWeight += t.weight; 
                    let completion = 0, passed = false; 
                    
                    if (t.type === 'single') { 
                        passed = formData[t.id] === true; 
                        completion = passed ? 1 : 0; 
                    } else if (t.type === 'list') { 
                        const total = t.items.length; 
                        let checked = 0; 
                        (t.items||[]).forEach(i => { if (formData[t.id]?.[i]) checked++; }); 
                        completion = total > 0 ? (checked / total) : 0; 
                        passed = !(t.mandatory && completion < 0.5); 
                    } else if (t.type === 'sections') { 
                        let total = 0, checked = 0; 
                        Object.keys(t.sections||{}).forEach(sec => { 
                            (t.sections[sec]||[]).forEach(i => { total++; if (formData[t.id]?.[sec]?.[i]) checked++; }); 
                        }); 
                        completion = total > 0 ? (checked / total) : 0; 
                        passed = !(t.mandatory && completion < 0.5); 
                    } 
                    
                    blockScore += (completion * t.weight); 
                    if (t.mandatory && !passed) { 
                        mandatoryFailed = true; 
                        failReasons.push(`FAILED: ${t.title}`); 
                    } 
                });
                return blockWeight > 0 ? Math.round((blockScore / blockWeight) * 100) : 0;
            };

            let final = 0;

            if (isLegacy) {
                final = processBlock(currentSyllabus);
                if (final < 50) failReasons.push(`SCORE BELOW 50%`);
                return { score: final, isFail: (final < 50 || mandatoryFailed), failReasons, mixedScoreInfo: null };
            }

            let minPassing = 80; 
            let mixedScoreInfo = null;

            if (dayType === 'Leave') {
                final = processBlock(SYLLABUS_V3['Normal']); 
                return { score: activityMode === 'Normal' ? final : 0, isFail: false, failReasons: [], mixedScoreInfo: null };
            }

            if (activityMode === 'Both') {
                const normalSubScore = processBlock(SYLLABUS_V3['Normal']);
                const leaveSubScore = processBlock(SYLLABUS_V3[dayType]);
                final = Math.round((normalSubScore + leaveSubScore) / 2); 
                
                if (dayType === 'External') minPassing = 50;
                if (dayType === 'Internal') minPassing = 70;
                if (dayType === 'Special') minPassing = 60;
                
                mixedScoreInfo = `Norm: ${normalSubScore}% | Spec: ${leaveSubScore}%`;
            } else {
                final = processBlock(currentSyllabus);
                if (activityMode === 'Normal' && dayType === 'External') minPassing = 21;
                else if (activityMode === 'Normal' && dayType === 'Internal') minPassing = 61;
                else if (activityMode === 'Normal' && dayType === 'Special') minPassing = 41;
                else minPassing = 80;
            }

            // Strict April 2026 Verification Rule for Purchase Permission Letter
            if (dateStr && dateStr.startsWith('2026-04')) {
                if (final < 66) {
                    failReasons.push(`APRIL RULE FAILED: Minimum 66% completion strictly required for Purchase Permission Letter.`);
                    return { score: final, isFail: true, failReasons, mixedScoreInfo };
                }
            }

            if (final < minPassing) { 
                failReasons.push(`SCORE BELOW REQUIRED ${minPassing}%`); 
                return { score: final, isFail: true, failReasons, mixedScoreInfo }; 
            } 
            if (mandatoryFailed) return { score: final, isFail: true, failReasons, mixedScoreInfo }; 
            
            return { score: final, isFail: false, failReasons: [], mixedScoreInfo }; 
        } 
    };

                    } 
                }

                setFormData(initialForm); setAnalysis(AnalysisEngine.calculateScore(currentDate, initialForm)); 
            }
        }, [currentDate]);

        const toggle = (id, sub, item) => {
            const next = JSON.parse(JSON.stringify(formData));
            if(sub && item) { if(!next[id]) next[id] = {}; if(!next[id][sub]) next[id][sub] = {}; next[id][sub][item] = !next[id][sub][item]; } 
            else if(item) { if(!next[id]) next[id] = {}; next[id][item] = !next[id][item]; } 
            else { next[id] = !next[id]; }
            setFormData(next); setAnalysis(AnalysisEngine.calculateScore(currentDate, next));
        };

        const handleConfigChange = (field, value) => {
            const next = { ...formData, [field]: value };
            if(field === 'dayType' && value === 'Normal') next.activityMode = 'Normal'; 
            setFormData(next); setAnalysis(AnalysisEngine.calculateScore(currentDate, next));
        };

        const save = () => { DB.saveActivity(currentDate, formData, analysis); refresh(); alert(`Activity Saved. Final Score: ${analysis.score}%`); setShowSettings(false); };
        
        const downloadReport = () => {
            const rows = [];
            currentSyllabus.forEach(s => {
                let status = "Pending";
                if(s.type === 'single') status = formData[s.id] ? "Done" : "Pending";
                else if(s.type === 'list') { status = `${((formData[s.id] && (s.items||[]).filter(i => formData[s.id][i])) || []).length}/${(s.items||[]).length}`; }
                else if(s.type === 'sections') { let total=0, done=0; Object.keys(s.sections||{}).forEach(k => { (s.sections[k]||[]).forEach(i => { total++; if(formData[s.id]?.[k]?.[i]) done++; }); }); status = `${done}/${total}`; }
                rows.push([s.title, status, s.mandatory ? "MANDATORY" : "OPTIONAL"]);
                if(s.type === 'sections') { Object.keys(s.sections||{}).forEach(k => { const secTotal = (s.sections[k]||[]).length; const secDone = (s.sections[k]||[]).filter(i => formData[s.id]?.[k]?.[i]).length; rows.push([`  – ${k}`, `${secDone}/${secTotal}`, '']); }); }
            });
            PDFSystem.generate(`Daily_Report_${currentDate}`, `Daily Activity Record (${dayType})`, ["Activity", "Status", "Type"], rows, { user: user.name, date: currentDate, mode: activityMode }, analysis.score, analysis.isFail ? "FAIL" : "PASS", true);

        const getThemeClasses = (typeId) => {
            if(typeId === 'External') return { bg: 'bg-purple-50', border: 'border-purple-200', text: 'text-purple-800', highlight: 'text-purple-600', checkBg: 'accent-purple-600' };
            if(typeId === 'Internal') return { bg: 'bg-orange-50', border: 'border-orange-200', text: 'text-orange-800', highlight: 'text-orange-600', checkBg: 'accent-orange-600' };
            if(typeId === 'Special') return { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-800', highlight: 'text-emerald-600', checkBg: 'accent-emerald-600' };
            if(typeId === 'Leave') return { bg: 'bg-pink-50', border: 'border-pink-200', text: 'text-pink-800', highlight: 'text-pink-600', checkBg: 'accent-pink-600' };

                                        <button onClick={() => handleConfigChange('activityMode', 'LeaveSpecific')} className={`p-4 rounded-xl text-[10px] font-black uppercase tracking-widest border transition shadow-sm ${activityMode === 'LeaveSpecific' ? 'bg-blue-600 text-white border-blue-700' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>Special Only</button>

                    {!isLegacy && dayType !== 'Normal' && (

                            {analysis.mixedScoreInfo && <div className={`text-[10px] font-black px-3 py-1.5 rounded-md shadow-inner border border-black/5 ${theme.bg} ${theme.text}`}>{analysis.mixedScoreInfo}</div>}

                    {analysis.isFail && <div className="bg-red-50 border border-red-200 p-5 rounded-2xl shadow-sm"><strong className="block mb-2 text-red-800 uppercase text-xs font-black tracking-widest flex items-center gap-2"><Icons.Warning /> VIOLATION LOG:</strong><ul className="list-disc pl-4 space-y-1 text-xs font-bold text-red-600">{(analysis.failReasons || []).map(r => <li key={r}>{r}</li>)}</ul></div>}
                    
                    {/* SYLLABUS RENDERING */}
                    {(currentSyllabus || []).map((s) => {
                        const isSpecialBlock = activityMode === 'Both' && !SYLLABUS_V3['Normal'].find(ns => ns.id === s.id);

                        return (
                            <div key={s.id} className={`${blockStyle} p-6 rounded-2xl shadow-sm border transition three-d-box ${s.mandatory ? `border-l-4 border-l-red-500 border-slate-200` : 'border-slate-200'}`}>
                                <div className="flex justify-between items-center mb-5 pb-3 border-b border-black/5">
                                    <h3 className={`font-black text-lg uppercase tracking-wide ${isSpecialBlock ? theme.text : 'text-slate-900'}`}>{s.title} {s.mandatory && <span className="ml-3 text-[9px] bg-red-50 text-red-600 px-2 py-1 rounded border border-red-100 align-middle tracking-widest shadow-sm">MANDATORY</span>}</h3>
                                    <span className="text-[10px] font-black bg-black/5 px-3 py-1.5 rounded text-slate-600 shadow-inner">{s.weight}%</span>
                                </div>
                                
                                {s.type === 'list' && (s.items || []).map(i => (
                                    <label key={i} className={`flex items-center gap-4 p-3 hover:bg-black/5 rounded-xl cursor-pointer transition group`}>
                                        <input type="checkbox" className={`custom-checkbox shadow-sm ${isSpecialBlock ? theme.checkBg : 'accent-blue-600'}`} checked={formData[s.id]?.[i]||false} onChange={() => toggle(s.id, null, i)} />

                                                <span className={`text-base font-extrabold transition ${formData[s.id]?.[sec]?.[i]?'text-slate-400 line-through':`group-hover:${isSpecialBlock ? theme.highlight : 'text-blue-600'} ${isSpecialBlock ? theme.text : 'text-slate-800'}`}`}>{i}</span>

    // =========================================================================
    // PART 7: DAILY PERFORMANCE MODALS (STATISTICS, INSTRUCTIONS, AVAILABLE DAYS)
    // =========================================================================

    // --- 1. Statistics Modal (Chart.js Integration) ---
    const DailyStatsModal = ({ dateStr, formData, analysis }) => {
        const { setShowStatsModal } = useContext(AppContext);
        const chartRef = useRef(null);
        let chartInstance = null;

        useEffect(() => {
            if (chartRef.current && analysis) {
                if (chartInstance) chartInstance.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Completed Score (%)', 'Pending/Failed (%)'],
                        datasets: [{
                            data: [analysis.score, Math.max(0, 100 - analysis.score)],
                            backgroundColor: ['#22c55e', '#ef4444'],
                            borderWidth: 2, 
                            borderColor: '#ffffff', 
                            hoverOffset: 4
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { 
                            legend: { position: 'bottom', labels: { font: { family: 'Inter', weight: 'bold' } } } 
                        } 
                    }
                });
            }
            return () => { if (chartInstance) chartInstance.destroy(); };
        }, [analysis]);

        return (
            <div className="fixed inset-0 z-[300] bg-slate-900/80 backdrop-blur-sm flex justify-center items-center p-4 animate-pop-in">
                <div className="bg-white w-full max-w-2xl max-h-[90vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden border-t-8 border-blue-500">
                    <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 no-print">
                        <div className="flex items-center gap-3">
                            <span className="text-2xl">📊</span>
                            <h3 className="font-black text-lg text-slate-800 uppercase tracking-wide">Daily Statistics</h3>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => window.print()} className="p-2 bg-blue-100 text-blue-700 rounded-lg font-bold text-xs uppercase tracking-widest hover:bg-blue-200 transition shadow-sm">Print</button>
                            <button onClick={() => setShowStatsModal(false)} className="p-2 bg-slate-200 text-slate-600 hover:bg-red-500 hover:text-white rounded-lg transition font-bold shadow-sm">✕</button>

    // --- 3. Available Days Modal (Chart.js Bar Graph) ---
    const AvailableDaysModal = () => {
        const { setShowAvailableDaysModal } = useContext(AppContext);
        const chartRef = useRef(null);
        let chartInstance = null;
        
        // Calculate Usage from Database
        const currentMonthPrefix = new Date().toISOString().slice(0, 7);
        const activities = DB.getActivities();
        let extUsed = 0, intUsed = 0, specUsed = 0;
        
        Object.keys(activities).forEach(date => {
            if (date.startsWith(currentMonthPrefix)) {
                const type = activities[date].dayType;
                if (type === 'External') extUsed++;
                if (type === 'Internal') intUsed++;
                if (type === 'Special') specUsed++;
            }
        });

        const limits = { ext: 6, int: 2, spec: 2 };

        useEffect(() => {
            if (chartRef.current) {
                if (chartInstance) chartInstance.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['External Exam', 'Internal Exam', 'Special Leave'],
                        datasets: [
                            { 
                                label: 'Days Used', 
                                data: [extUsed, intUsed, specUsed], 
                                backgroundColor: '#ef4444', 
                                borderRadius: 4 
                            },
                            { 
                                label: 'Remaining Days', 
                                data: [Math.max(0, limits.ext - extUsed), Math.max(0, limits.int - intUsed), Math.max(0, limits.spec - specUsed)], 
                                backgroundColor: '#22c55e', 
                                borderRadius: 4 
                            }
                        ]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        scales: { 
                            x: { stacked: true }, 
                            y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } } 
                        }, 
                        plugins: { 
                            legend: { position: 'bottom', labels: { font: { family: 'Inter', weight: 'bold' } } } 
                        } 
                    }
                });
            }
            return () => { if (chartInstance) chartInstance.destroy(); };

                        <h2 className="text-center text-xl font-black uppercase mb-6 tracking-widest border-b border-slate-200 pb-3 text-slate-900">
                            Quota for {new Date().toLocaleString('default', {month:'long', year:'numeric'})}

                        <div className="chart-container"><canvas ref={chartRef}></canvas></div>
                        
                        <div className="mt-8 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

    // --- WEEKLY VIEW REPORT ---
    const WeeklyView = () => {
        const { user, setView, setCurrentDate } = useContext(AppContext);
        const [days, setDays] = useState([]);
        const [weekOffset, setWeekOffset] = useState(0);

        useEffect(() => {
            const curr = new Date();
            const day = curr.getDay(); 
            const diff = curr.getDate() - day + (day === 0 ? -6 : 1) + (weekOffset * 7);
            const monday = new Date(curr.setDate(diff));

            const arr = [];
            for (let i = 0; i < 7; i++) {
                const temp = new Date(monday); 
                temp.setDate(monday.getDate() + i);
                const offset = temp.getTimezoneOffset() * 60000;
                const dateStr = new Date(temp.getTime() - offset).toISOString().split('T')[0];
                const entry = DB.getActivities()[dateStr];
                const stats = AnalysisEngine.calculateScore(dateStr, entry);
                const dayType = entry?.dayType || 'Normal';
                
                arr.push({ 
                    date: dateStr, 
                    dayName: temp.toLocaleDateString('en-US', { weekday: 'long' }), 
                    score: stats.score, 
                    isFail: stats.isFail, 
                    dayType, 
                    mixedScoreInfo: stats.mixedScoreInfo 
                });
            }
            setDays(arr);
        }, [weekOffset]);

        const downloadWeekPDF = () => {
            const rows = (days || []).map(d => [d.date, d.dayName, `${d.score}%`, d.isFail ? "FAIL" : "PASS"]);
            const avg = days.length ? Math.round(days.reduce((a,b)=>a+b.score,0)/7) : 0;
            PDFSystem.generate(`Weekly_Report`, `Weekly Performance Record`, ["Date", "Day", "Score", "Status"], rows, { user: user.name, weekStart: days[0]?.date || '' }, avg, avg >= 50 ? "PASS" : "FAIL", false);
        };

        return (
            <div className="pb-20 max-w-lg mx-auto min-h-screen bg-[#f8fafc] p-6 no-print">
                <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                    <button onClick={() => setView('dashboard')} className="p-2 bg-slate-50 rounded-full hover:bg-slate-200 transition text-slate-500"><Icons.Back /></button>
                    <div className="flex items-center gap-4">
                        <button onClick={() => setWeekOffset(weekOffset - 1)} className="font-black text-xl text-slate-400 hover:text-blue-600 transition">&lt;</button>
                        <div className="text-center">
                            <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest">Weekly Record</h3>
                            <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">{days[0]?.date} to {days[6]?.date}</span>
                        </div>
                        <button onClick={() => setWeekOffset(weekOffset + 1)} className="font-black text-xl text-slate-400 hover:text-blue-600 transition">&gt;</button>
                    </div>
                    <DepartmentNoticeBtn officeName="Weekly Report" />
                </div>
                
                <DynamicFeatureRenderer location="Weekly Report Top" />
                
                <div className="grid grid-cols-1 gap-4 mt-4">
                    {(days || []).map((d, index) => (
                        <React.Fragment key={d.date}>
                            {index === 3 && <DynamicFeatureRenderer location="Weekly Report Middle" />}
                            <div onClick={() => { setCurrentDate(d.date); setView('activity'); }} className={`p-5 rounded-2xl border-l-4 cursor-pointer shadow-sm flex justify-between items-center transition hover:scale-[1.02] three-d-box ${d.isFail ? 'bg-red-50 border-red-500' : 'bg-white border-green-500'}`}>
                                <div>
                                    <div className="font-black text-slate-800 text-sm tracking-wide">{d.date}</div>
                                    <div className="text-[10px] uppercase text-slate-500 font-bold tracking-widest mt-1 flex items-center gap-2">
                                        {d.dayName} 
                                        {d.dayType !== 'Normal' && <span className="bg-slate-200 text-slate-700 px-2 py-0.5 rounded">{d.dayType}</span>}
                                    </div>
                                    {d.mixedScoreInfo && <div className="text-[9px] font-black text-blue-600 mt-1.5 tracking-widest bg-blue-50 px-2 py-0.5 rounded inline-block shadow-sm">{d.mixedScoreInfo}</div>}

                    ))}

                <DynamicFeatureRenderer location="Weekly Report Bottom" />
                
                <button onClick={downloadWeekPDF} className="w-full mt-6 bg-slate-900 text-white py-4 rounded-xl font-black flex justify-center items-center gap-3 shadow-xl hover:bg-slate-800 transition uppercase tracking-widest text-xs"><Icons.Pdf /> Download Weekly Report PDF</button>
            </div>
        );
    };

    // --- ADVANCED MONTHLY CALENDAR VIEW (DETAILED & COLORFUL) ---
    const MonthView = () => {
        const { user, setView, setCurrentDate } = useContext(AppContext);
        const [days, setDays] = useState([]);
        const [selectedMonth, setSelectedMonth] = useState(new Date());
        const [leaveMap, setLeaveMap] = useState({});

        useEffect(() => {
            const leaveProto = DB.getLeaveProto();
            const leaves = leaveProto?.grid ? Object.values(leaveProto.grid).flat() : (leaveProto?.logs || []);
            const lMap = {};
            (leaves || []).forEach(l => { if(l.date) lMap[l.date] = l.type; });
            setLeaveMap(lMap);
        }, [selectedMonth]);

        useEffect(() => {
            const y = selectedMonth.getFullYear(), m = selectedMonth.getMonth();
            const totalDays = new Date(y, m + 1, 0).getDate();
            const firstDay = new Date(y, m, 1).getDay();
            const arr = [];
            for(let i = 0; i < firstDay; i++) arr.push({ blank: true });
            for(let d = 1; d <= totalDays; d++) {
                const dateObj = new Date(y, m, d);
                const offset = dateObj.getTimezoneOffset() * 60000;
                const dateStr = new Date(dateObj.getTime() - offset).toISOString().split('T')[0];
                const entry = DB.getActivities()[dateStr];
                const stats = AnalysisEngine.calculateScore(dateStr, entry);
                const dayType = entry?.dayType || 'Normal';
                arr.push({ 
                    d, date: dateStr, score: stats.score, isFail: stats.isFail, 
                    dayType, mixedScoreInfo: stats.mixedScoreInfo, activityMode: entry?.activityMode || 'Normal' 
                });
            }
            setDays(arr);
        }, [selectedMonth]);

        const changeMonth = (delta) => { 
            const newDate = new Date(selectedMonth); 
            newDate.setMonth(newDate.getMonth() + delta); 
            setSelectedMonth(newDate); 
        };
        
        const getColor = (item) => { 
            if (leaveMap[item.date]) {
                const lType = leaveMap[item.date];
                if(lType.includes('Standard')) return 'bg-purple-100 text-purple-900 border-purple-400 shadow-md';
                if(lType.includes('Emergency')) return 'bg-pink-100 text-pink-900 border-pink-400 shadow-md';
                if(lType.includes('Academic')) return 'bg-teal-100 text-teal-900 border-teal-400 shadow-md';
            }
            if(item.isFail) return 'bg-red-100 text-red-800 border-red-400 shadow-sm'; 
            
            if(item.score > 0 && item.dayType === 'External') return 'bg-purple-200 text-purple-900 border-purple-500 shadow-sm';
            if(item.score > 0 && item.dayType === 'Internal') return 'bg-orange-200 text-orange-900 border-orange-500 shadow-sm';
            if(item.score > 0 && item.dayType === 'Special') return 'bg-emerald-200 text-emerald-900 border-emerald-500 shadow-sm';
            if(item.score > 0 && item.dayType === 'Leave') return 'bg-pink-200 text-pink-900 border-pink-500 shadow-sm';

            if(item.score === 0) return 'bg-white text-slate-300 border-slate-200'; 
            if(item.score < 50) return 'bg-red-50 text-red-600 border-red-200'; 
            if(item.score < 80) return 'bg-yellow-50 text-yellow-600 border-yellow-200'; 
            if(item.score < 90) return 'bg-green-100 text-green-700 border-green-300'; 
            return 'bg-green-500 text-white border-green-600 shadow-md'; 
        };
        
        const getStars = (score) => {
            if (score === 100) return '⭐⭐⭐⭐⭐';
            if (score >= 99) return '⭐⭐⭐⭐';
            if (score >= 97) return '⭐⭐⭐';
            if (score >= 95) return '⭐⭐';
            if (score >= 92) return '⭐';
            return '';
        };

        const downloadMonthlyReport = () => { 
            const filteredDays = (days || []).filter(d => !d.blank && d.score > 0);
            const rows = (days || []).filter(d => !d.blank).map(d => [d.date, `${d.score}%`, leaveMap[d.date] ? leaveMap[d.date] : (d.isFail ? "FAIL" : d.score > 0 ? "PASS" : "ABSENT")]); 
            const monthName = selectedMonth.toLocaleString('default', { month: 'long', year: 'numeric' }); 
            const avg = filteredDays.length > 0 ? Math.round(filteredDays.reduce((a,b)=>a+b.score,0)/filteredDays.length) : 0;
            PDFSystem.generate(`Monthly_Report_${monthName}`, `Monthly Assessment Record`, ["Date", "Score", "Status/Leave"], rows, { user: user.name, month: monthName }, avg, avg >= 50 ? "PASS" : "FAIL", false); 
        };

        return (
            <div className="pb-20 max-w-xl mx-auto min-h-screen bg-[#f8fafc] p-6 no-print">
                <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                    <button onClick={() => setView('dashboard')} className="p-2 hover:bg-slate-100 rounded-full transition text-slate-500"><Icons.Back /></button>
                    <div className="flex items-center gap-5">
                        <button onClick={()=>changeMonth(-1)} className="font-black text-xl text-slate-400 hover:text-blue-600 transition">&lt;</button>
                        <div className="text-center">
                            <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Monthly Grid</h3>
                            <div className="font-black text-lg text-slate-800 tracking-wider uppercase">{selectedMonth.toLocaleString('default', { month: 'long', year: 'numeric' })}</div>
                        </div>
                        <button onClick={()=>changeMonth(1)} className="font-black text-xl text-slate-400 hover:text-blue-600 transition">&gt;</button>
                    </div>
                    <DepartmentNoticeBtn officeName="Monthly Report" />
                </div>
                
                <DynamicFeatureRenderer location="Monthly Report Top" />
                
                <div className="grid grid-cols-7 gap-2 mb-2 text-center mt-4">
                    {['S','M','T','W','T','F','S'].map(d => <div key={d} className="text-xs font-black text-slate-400">{d}</div>)}
                </div>
                <div className="grid grid-cols-7 gap-2">
                    {(days || []).map((item, i) => { 
                        if (item.blank) return <div key={i} className="aspect-square"></div>; 
                        const isLeave = leaveMap[item.date];
                        return (
                            <button key={item.date} onClick={() => { setCurrentDate(item.date); setView('activity'); }} className={`aspect-square rounded-xl flex flex-col items-center justify-center border transition relative overflow-hidden tap-effect shadow-sm hover:scale-[1.05] ${getColor(item)}`}>
                                <span className="text-sm font-black z-10">{item.d}</span>
                                
                                {item.score > 0 && !isLeave && <span className="text-[10px] font-black z-10">{item.score}%</span>}
                                
                                {!isLeave && item.dayType !== 'Normal' && (
                                    <span className="text-[5px] font-black uppercase tracking-widest mt-0.5 opacity-90 text-center leading-tight bg-white/50 px-1 rounded shadow-sm text-slate-900">{item.dayType}</span>
                                )}
                                {!isLeave && item.mixedScoreInfo && item.activityMode === 'Both' && (
                                    <span className="text-[4px] font-black uppercase tracking-tighter mt-1 opacity-90 text-center leading-tight px-1 bg-black/10 rounded">{item.mixedScoreInfo.replace(' | ', '\n')}</span>
                                )}

                                {item.score >= 92 && !isLeave && item.dayType === 'Normal' && <span className="text-[6px] tracking-tighter z-10 mt-0.5">{getStars(item.score)}</span>}
                                {item.isFail && !isLeave && <div className="absolute inset-0 flex items-center justify-center text-red-500/20 font-black text-4xl rotate-[-20deg]">F</div>}
                                {isLeave && <span className="text-[6px] font-black tracking-widest mt-1 uppercase opacity-90 text-center leading-tight bg-white/40 px-1 rounded shadow-sm">{isLeave.split(' ')[0]}</span>}
                            </button>
                        ); 
                    })}

    // --- ORDINANCE MODULE (Executive Directives) ---

            DB.saveOrdinanceCats(data);

            saveCatsToDB([...(ordCats || []), { id: `New_Category_${Date.now()}`, icon: '📄' }]);

            if(!newId || oldId === newId) return setEditingCatId(null);

            const updatedNotices = allNotices.map(n => n.ordTarget === oldId ? { ...n, ordTarget: newId } : n);

            setEditingCatId(null);

            e.stopPropagation();
            if(id === 'All Important Ordinance') return alert("Default category cannot be deleted.");

                saveCatsToDB((ordCats || []).filter(c => c.id !== id));

                                            )}
                                            <div className="text-4xl mb-3 drop-shadow-sm">{cat.icon}</div>
                                            {editingCatId === cat.id ? (

    // --- AI PARLIAMENT (Two-Way Debate System) ---
    const AIParliament = () => {
        const { setView } = useContext(AppContext);
        const [messages, setMessages] = useState(DB.getParliamentBills() || []);
        const [input, setInput] = useState('');

        const chatEndRef = useRef(null);

        // Auto-scroll to bottom of chat
        useEffect(() => { 
            chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); 
        }, [messages]);

        const handleSend = async () => {
            if (!input.trim()) return;
            const userMsg = { 
                id: Date.now(), 
                sender: 'user', 
                text: input, 
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
            };
            
            const updatedMessages = [...messages, userMsg];
            setMessages(updatedMessages);
            DB.saveParliamentBills(updatedMessages);
            setInput('');
            setIsLoading(true);

            // Context generation for AI
            const systemPrompt = `You are the AI Parliament of ARATS. The user is the Governor/Citizen (Aryan Rajput). You consist of multiple members (e.g., [Speaker], [Opposition Leader], [Supporter]). When the user proposes an idea, routine change, or bill, debate it strictly based on the ARATS Constitution (Focus, Discipline, Goal 2029, No Gaming, Academic Excellence). Format your response by prefixing the member's name like "**[Opposition Leader]:** ...". Keep it formal, slightly strict, and highly analytical. Provide a final [Parliament Verdict] at the end.`;
            
            // Build chat history for context
            const chatHistory = updatedMessages.map(m => `${m.sender === 'user' ? 'Governor' : 'Parliament'}: ${m.text}`).join("\n");
            const fullPrompt = `${chatHistory}\nGovernor: ${userMsg.text}`;

            const aiResponseText = await GeminiAI.generateResponse(fullPrompt, systemPrompt);
            
            const aiMsg = { 
                id: Date.now()+1, 
                sender: 'ai', 
                text: aiResponseText, 
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
            };
            
            const finalMessages = [...updatedMessages, aiMsg];
            setMessages(finalMessages);
            DB.saveParliamentBills(finalMessages);
            setIsLoading(false);
        };

        const clearHistory = () => { 
            if(confirm("Clear all parliamentary debates? This action cannot be undone.")) { 
                setMessages([]); 
                DB.saveParliamentBills([]); 
            } 
        };

        return (
            <div className="min-h-screen bg-[#f1f5f9] font-sans flex flex-col h-screen no-print">
                <div className="bg-indigo-900 text-white p-4 shadow-md flex items-center justify-between z-10">
                    <div className="flex items-center gap-3">
                        <button onClick={() => setView('integrity_dashboard')} className="p-2 bg-white/10 hover:bg-white/20 rounded-full transition"><Icons.Back /></button>
                        <div>
                            <h2 className="text-xl font-black leading-tight">AI Parliament</h2>

                        </div>
                    </div>
                    <button onClick={clearHistory} className="p-2 bg-red-500/20 text-red-200 hover:bg-red-500 hover:text-white rounded-lg transition text-xs font-bold uppercase tracking-widest shadow-sm"><Icons.Trash /></button>
                </div>

                <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
                    {messages.length === 0 && (
                        <div className="text-center py-20 animate-fade-in">
                            <span className="text-6xl mb-4 block drop-shadow-md">🏛️</span>
                            <h3 className="font-black text-slate-500 uppercase tracking-widest text-lg">Session is Open</h3>
                            <p className="text-xs font-bold text-slate-400 mt-2">Propose a bill, rule change, or daily activity to the AI Parliament for debate.</p>
                        </div>
                    )}
                    {messages.map(msg => (
                        <div key={msg.id} className={`flex flex-col animate-slide-up ${msg.sender === 'user' ? 'items-end' : 'items-start'}`}>
                            <div className={`text-[10px] font-black uppercase tracking-widest mb-1 ${msg.sender === 'user' ? 'text-blue-600 pr-2' : 'text-indigo-600 pl-2'}`}>
                                {msg.sender === 'user' ? 'You (Governor)' : 'Parliament Members'} • {msg.time}
                            </div>
                            <div className={`${msg.sender === 'user' ? 'user-message shadow-md' : 'ai-message shadow-md bg-white border-l-4 border-indigo-500'}`}>
                                {msg.sender === 'user' ? (
                                    <p className="text-sm font-medium leading-relaxed">{msg.text}</p>
                                ) : (
                                    <div className="markdown-body text-sm font-medium text-slate-800 leading-relaxed" dangerouslySetInnerHTML={{ __html: marked.parse(msg.text) }} />
                                )}
                            </div>
                        </div>
                    ))}
                    {isLoading && (
                        <div className="flex flex-col items-start animate-fade-in">
                            <div className="text-[10px] font-black uppercase tracking-widest mb-1 text-indigo-500 pl-2">Parliament Members</div>
                            <div className="ai-message shadow-sm bg-white flex items-center gap-2 border-l-4 border-indigo-300 p-4">
                                <div className="w-2.5 h-2.5 bg-indigo-400 rounded-full animate-bounce"></div>
                                <div className="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                <div className="w-2.5 h-2.5 bg-indigo-600 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                <span className="text-xs font-bold text-slate-500 ml-3 uppercase tracking-widest">Debating Proposal...</span>
                            </div>
                        </div>
                    )}
                    <div ref={chatEndRef} />
                </div>

                <div className="bg-white p-4 border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                    <div className="max-w-4xl mx-auto flex gap-3">
                        <textarea className="flex-1 bg-slate-50 border border-slate-300 p-4 rounded-xl text-sm font-bold outline-none focus:border-indigo-500 resize-none h-14 custom-scrollbar shadow-inner transition-colors" placeholder="Draft your proposal or bill here..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter' && !e.shiftKey){e.preventDefault(); handleSend();}}}></textarea>
                        <button onClick={handleSend} disabled={isLoading} className={`bg-indigo-600 text-white px-8 rounded-xl font-black uppercase tracking-widest shadow-md hover:bg-indigo-700 transition flex items-center justify-center ${isLoading ? 'opacity-50 cursor-not-allowed' : 'hover:scale-105'}`}>SEND</button>
                    </div>
                </div>
            </div>
        );
    };

    // --- AI SUPREME COURT (Judicial Review System) ---
    const AISupremeCourt = () => {
        const { setView } = useContext(AppContext);
        const [cases, setCases] = useState(DB.getSCAbhilekh() || []);
        const [input, setInput] = useState('');
        const [isLoading, setIsLoading] = useState(false);

        const handleFileCase = async () => {
            if (!input.trim()) return;
            const userCase = { 
                id: Date.now(), 
                petitioner: 'Governor', 
                text: input, 
                date: DB.getToday(), 
                status: 'Pending Review' 
            };
            
            const newCases = [userCase, ...cases];
            setCases(newCases);
            DB.saveSCAbhilekh(newCases);
            setInput('');
            setIsLoading(true);

            const systemPrompt = `You are the Chief Justice of the ARATS Supreme Court. The user will present an action, a dilemma, or a past mistake. You must judge it strictly according to the ARATS Constitution (Focus, Complete ban on gaming, Strict Discipline). Provide a detailed, highly formal ruling. Format: \n\n**[ANALYSIS]:** ...\n**[CONSTITUTIONAL VALIDITY]:** (Valid / Null & Void / Unconstitutional)\n**[VERDICT & PUNISHMENT]:** ...`;
            
            const aiResponseText = await GeminiAI.generateResponse(`Case Description: ${userCase.text}`, systemPrompt);
            
            const resolvedCases = newCases.map(c => c.id === userCase.id ? { ...c, verdict: aiResponseText, status: 'Resolved' } : c);
            setCases(resolvedCases);
            DB.saveSCAbhilekh(resolvedCases);
            setIsLoading(false);
        };

        const deleteCase = (id) => { 
            if(confirm("Purge this case from Supreme Court Abhilekh?")) { 
                const updated = cases.filter(c => c.id !== id); 
                setCases(updated); 
                DB.saveSCAbhilekh(updated); 
            } 
        };

        return (
            <div className="min-h-screen bg-[#f8fafc] pb-24 font-sans text-slate-800 no-print">
                <div className="bg-amber-700 text-white sticky top-0 z-40 p-4 shadow-md flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <button onClick={() => setView('integrity_dashboard')} className="p-2 bg-black/20 hover:bg-black/30 rounded-full transition"><Icons.Back /></button>
                        <div>
                            <h2 className="text-xl font-black leading-tight">AI Supreme Court</h2>
                            <p className="text-[10px] font-bold text-amber-200 uppercase tracking-widest">Apex Judicial Review</p>

                    </div>
                </div>

                        <div className="absolute top-[-20px] right-[-20px] text-8xl opacity-5 pointer-events-none">⚖️</div>

                        <textarea className="w-full bg-slate-50 border border-slate-300 p-5 rounded-2xl text-sm font-bold outline-none focus:border-amber-500 resize-none h-32 mb-5 shadow-inner transition-colors" placeholder="E.g., I watched a movie today instead of studying for 2 hours. Is this constitutionally acceptable?" value={input} onChange={e=>setInput(e.target.value)}></textarea>
                        
                        <button onClick={handleFileCase} disabled={isLoading} className={`w-full bg-amber-600 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg transition ${isLoading ? 'opacity-50 cursor-wait' : 'hover:bg-amber-700 hover:shadow-xl hover:-translate-y-0.5'}`}>
                            {isLoading ? 'CHIEF JUSTICE IS REVIEWING...' : 'SUMMON THE COURT'}

                    </div>

                    <div className="space-y-5 mt-8">

                                    <div>
                                        <span className={`text-[10px] font-black px-3 py-1 rounded-md uppercase tracking-widest shadow-sm ${c.status==='Resolved'?'bg-green-100 text-green-800 border border-green-200':'bg-amber-100 text-amber-800 border border-amber-200'}`}>{c.status}</span>

    // --- AI EXECUTIVE HEAD (Actionable Advice System) ---
    const AIExecutive = () => {
        const { setView } = useContext(AppContext);
        const [chat, setChat] = useState([]);
        const [input, setInput] = useState('');
        const [isLoading, setIsLoading] = useState(false);
        const chatEndRef = useRef(null);

        // Auto-scroll to latest message
        useEffect(() => { 
            chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); 
        }, [chat]);

        const handleAsk = async () => {
            if (!input.trim()) return;
            const newChat = [...chat, { role: 'user', text: input }];
            setChat(newChat);
            setInput('');

    const FinanceProtocol = () => {
        const { setView } = useContext(AppContext);
        const [finance, setFinance] = useState(DB.getFinanceProto() || { monthlyBudgets: {}, auditRegister: [] });
        const [activeMonth, setActiveMonth] = useState(new Date().toLocaleString('default', { month: 'long', year: 'numeric' }));

        const initMonth = () => {
            if(!finance?.monthlyBudgets?.[activeMonth]) {
                const newMonth = { 
                    opening: '', withdrawn: '', closing: '', 
                    rows: Array.from({length: 10}, () => ({ category: '', percent: '', inAllot: '', date: '', reason: '', done: false })) 
                };
                const updated = { ...finance, monthlyBudgets: { ...(finance?.monthlyBudgets || {}), [activeMonth]: newMonth } };
                DB.saveFinanceProto(updated); 
                setFinance(updated);
            }
        };
        
        useEffect(() => { initMonth(); }, [activeMonth]);

        const currentData = finance?.monthlyBudgets?.[activeMonth] || { opening: '', withdrawn: '', closing: '', rows: Array.from({length: 10}, () => ({ category: '', percent: '', inAllot: '', date: '', reason: '', done: false })) };

        const updateTop = (field, val) => { 
            const updated = { ...finance, monthlyBudgets: { ...(finance?.monthlyBudgets || {}), [activeMonth]: { ...currentData, [field]: val } } }; 
            DB.saveFinanceProto(updated); 
            setFinance(updated); 
        };
        
        const updateRow = (index, field, val) => { 
            const newRows = [...(currentData?.rows || [])]; 
            newRows[index] = { ...newRows[index], [field]: val }; 
            const updated = { ...finance, monthlyBudgets: { ...(finance?.monthlyBudgets || {}), [activeMonth]: { ...currentData, rows: newRows } } }; 
            DB.saveFinanceProto(updated); 
            setFinance(updated); 
        };
        
        const addAudit = () => { 
            const newAudit = { id: Date.now(), date: '', credit: '', withdraw: '', reason: '', auditResult: 'Passed' }; 
            const updated = { ...finance, auditRegister: [newAudit, ...(finance?.auditRegister || [])] }; 
            DB.saveFinanceProto(updated); 
            setFinance(updated); 
        };
        
        const updateAudit = (id, field, val) => { 
            const updated = { ...finance, auditRegister: (finance?.auditRegister || []).map(a => a.id === id ? { ...a, [field]: val } : a) }; 
            DB.saveFinanceProto(updated); 
            setFinance(updated); 
        };
        
        const deleteAudit = (id) => { 
            if(!confirm("Delete this audit record?")) return;
            const updated = { ...finance, auditRegister: (finance?.auditRegister || []).filter(a => a.id !== id) }; 
            DB.saveFinanceProto(updated); 
            setFinance(updated); 
        };

            const rows = (finance?.auditRegister || []).map(a => [a.date, `Rs.${a.credit}`, `Rs.${a.withdraw}`, a.reason, a.auditResult]);
            PDFSystem.generate(`Finance_Audit`, `Financial Audit Register`, ["Date", "Credit", "Withdraw", "Reason", "Status"], rows, { Month: activeMonth }, null, null, false);

                                    <th className="w-32 text-center bg-slate-100">WITHDRAW (-)</th>
                                    <th className="bg-slate-100">REASON/ITEM</th>
                                    <th className="w-40 text-center bg-slate-100">AUDIT RESULT</th>
                                    <th className="w-12 bg-slate-100"></th>

                            <tbody>
                                {(!finance?.auditRegister || finance.auditRegister.length === 0) ? <tr><td colSpan="6" className="text-center text-sm py-10 text-slate-400 font-bold uppercase tracking-widest border-t border-slate-100">No audit records available.</td></tr> : (finance?.auditRegister || []).map(a => (
                                    <tr key={a.id} className="border-t border-slate-100 hover:bg-slate-50 transition-colors">
                                        <td className="p-2"><input type="date" className="w-full bg-transparent outline-none text-[10px] font-bold text-slate-500 uppercase p-2 rounded focus:bg-white focus:ring-1 focus:ring-emerald-200 transition cursor-pointer" value={a.date} onChange={e=>updateAudit(a.id, 'date', e.target.value)} /></td>
                                        <td className="p-2"><input type="number" className="w-full bg-transparent outline-none text-sm font-black text-center text-green-600 p-2 rounded focus:bg-white focus:ring-1 focus:ring-emerald-200 transition" value={a.credit} onChange={e=>updateAudit(a.id, 'credit', e.target.value)} placeholder="₹" /></td>
                                        <td className="p-2"><input type="number" className="w-full bg-transparent outline-none text-sm font-black text-center text-red-600 p-2 rounded focus:bg-white focus:ring-1 focus:ring-emerald-200 transition" value={a.withdraw} onChange={e=>updateAudit(a.id, 'withdraw', e.target.value)} placeholder="₹" /></td>
                                        <td className="p-2"><input className="w-full bg-transparent outline-none text-sm font-bold text-slate-800 p-2 rounded focus:bg-white focus:ring-1 focus:ring-emerald-200 transition" value={a.reason} onChange={e=>updateAudit(a.id, 'reason', e.target.value)} placeholder="Details..." /></td>

                                                <option value="Failed (>5% Waste)">Failed (>5% Waste)</option>
                                            </select>
                                        </td>
                                        <td className="text-center p-2"><button onClick={() => deleteAudit(a.id)} className="text-slate-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition"><Icons.Trash/></button></td>

    };

    // --- BANK DETAIL (SBI / BOB) ---
    const BankDetail = ({ code, name, color, onBack }) => {
        const [bank, setBank] = useState(DB.getBank(code) || { balance: 0, logs: [] });
        const [form, setForm] = useState({ 
            date: DB.getToday(), 
            time: new Date().toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit'}), 
            amount: '', 
            type: 'CREDIT', 
            remark: '' 
        });

        const handleTransact = () => {
            if(!form.amount || !form.remark) return;
            let newBal = bank.balance || 0;
            if(form.type === 'CREDIT') newBal += Number(form.amount);
            else newBal -= Number(form.amount);
            
            const newLog = { id: Date.now(), ...form, amount: Number(form.amount), balanceAfter: newBal };
            const updated = { balance: newBal, logs: [newLog, ...(bank.logs || [])] };
            
            DB.saveBank(code, updated); 
            setBank(updated);
            setForm({...form, amount: '', remark: ''});
        };

        const deleteTransact = (id, logAmount, type) => {
            if(!confirm("Are you sure you want to delete this transaction record?")) return;
            
            let newBal = bank.balance || 0;
            if(type === 'CREDIT') newBal -= logAmount;
            else newBal += logAmount;

            const updatedLogs = bank.logs.filter(l => l.id !== id);
            const updated = { balance: newBal, logs: updatedLogs };
            
            DB.saveBank(code, updated);
            setBank(updated);
        };

        const downloadBankPDF = () => {
            const rows = (bank.logs || []).map(l => [l.date, l.time, l.type, `Rs. ${l.amount}`, l.remark, `Rs. ${l.balanceAfter}`]);
            PDFSystem.generate(`${code}_Statement`, `${name} Statement`, ["Date", "Time", "Type", "Amount", "Remark", "Balance"], rows, { "Current Balance": `Rs. ${bank.balance || 0}` }, null, null, false);
        };

        return (
            <div className="min-h-screen bg-[#f8fafc] pb-24 font-sans text-slate-800 no-print">
                <div className={`sticky top-0 z-40 p-4 shadow-md flex items-center justify-between text-white ${color}`}>
                    <div className="flex items-center gap-3">
                        <button onClick={onBack} className="p-2 bg-white/20 hover:bg-white/30 rounded-full transition"><Icons.Back /></button>
                        <div>
                            <h2 className="text-xl font-black leading-tight">{code} Banking</h2>
                            <p className="text-[10px] font-bold uppercase tracking-widest opacity-80">{name}</p>
                        </div>
                    </div>
                    <div className="flex items-center gap-2">
                        <DepartmentNoticeBtn officeName={`${code} Banking`} />
                        <button onClick={downloadBankPDF} className="p-2 bg-white/20 hover:bg-white/30 rounded-xl shadow-sm transition hover:scale-105"><Icons.Pdf /></button>
                    </div>
                </div>

                <div className="p-4 max-w-4xl mx-auto space-y-6 mt-4">
                    <DynamicFeatureRenderer location="Bank Detail Top" />

                    <div className="three-d-box p-8 bg-white text-center rounded-3xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>
                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Available Account Balance</p>
                        <h1 className={`text-6xl font-black tracking-tighter ${code==='SBI'?'text-blue-800':code==='BOB'?'text-orange-600':'text-green-700'}`}>
                            ₹ {(bank.balance || 0).toLocaleString()}
                        </h1>
                    </div>

                    <div className="three-d-box p-6 md:p-8 bg-white rounded-3xl">
                        <h3 className="font-black text-xl text-slate-800 mb-5 border-b border-slate-100 pb-3 uppercase tracking-wide">New Transaction</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-5 mb-5">
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1.5">Date</label>
                                <input type="date" className="w-full bg-slate-50 p-3 rounded-xl outline-none border border-slate-200 focus:border-blue-400 text-sm font-bold text-slate-700 shadow-inner" value={form.date} onChange={e=>setForm({...form, date:e.target.value})} />
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1.5">Time</label>
                                <input type="time" className="w-full bg-slate-50 p-3 rounded-xl outline-none border border-slate-200 focus:border-blue-400 text-sm font-bold text-slate-700 shadow-inner" value={form.time} onChange={e=>setForm({...form, time:e.target.value})} />
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1.5">Transaction Type</label>
                                <select className={`w-full p-3 rounded-xl outline-none border font-black text-sm shadow-sm transition-colors ${form.type==='CREDIT'?'bg-green-50 text-green-700 border-green-200 focus:border-green-400':'bg-red-50 text-red-700 border-red-200 focus:border-red-400'}`} value={form.type} onChange={e=>setForm({...form, type:e.target.value})}>
                                    <option value="CREDIT">Deposit (+)</option>
                                    <option value="DEBIT">Withdraw (-)</option>
                                </select>
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1.5">Amount</label>
                                <input type="number" className="w-full bg-slate-50 p-3 rounded-xl outline-none border border-slate-200 focus:border-blue-400 text-sm font-black text-slate-800 shadow-inner" placeholder="₹ 0" value={form.amount} onChange={e=>setForm({...form, amount:e.target.value})} />
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <input className="flex-1 bg-slate-50 p-4 rounded-xl outline-none border border-slate-200 focus:border-blue-400 text-sm font-bold text-slate-700 shadow-inner" placeholder="Transaction Remark / Reason / Paid to..." value={form.remark} onChange={e=>setForm({...form, remark:e.target.value})} />
                            <button onClick={handleTransact} className={`px-10 font-black text-white rounded-xl uppercase tracking-widest shadow-md transition hover:-translate-y-0.5 ${code==='SBI'?'bg-blue-800 hover:bg-blue-900':code==='BOB'?'bg-orange-600 hover:bg-orange-700':'bg-green-700 hover:bg-green-800'}`}>PROCESS</button>
                        </div>
                    </div>

                    <div className="three-d-box p-6 md:p-8 bg-white rounded-3xl overflow-x-auto">
                        <h3 className="font-black text-xl text-slate-800 mb-5 border-b border-slate-100 pb-3 uppercase tracking-wide">Transaction History</h3>
                        <table className="protocol-table w-full text-left">
                            <thead>
                                <tr>
                                    <th className="bg-slate-50 rounded-tl-lg">Date & Time</th>
                                    <th className="bg-slate-50 text-center">Type</th>
                                    <th className="bg-slate-50 text-right">Amount</th>
                                    <th className="bg-slate-50">Remark</th>
                                    <th className="bg-slate-50 text-right">Bal. After</th>
                                    <th className="bg-slate-50 rounded-tr-lg"></th>
                                </tr>
                            </thead>
                            <tbody>
                                {(!bank.logs || bank.logs.length === 0) ? (
                                    <tr><td colSpan="6" className="text-center py-10 text-slate-400 font-bold italic">No transactions initiated yet.</td></tr>
                                ) : (bank.logs || []).map(l => (
                                    <tr key={l.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                        <td className="py-4 px-2 text-xs font-mono font-bold text-slate-500">{l.date} <span className="ml-2 text-[10px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-400">{l.time}</span></td>
                                        <td className="py-4 px-2 text-center"><span className={`text-[10px] font-black px-2.5 py-1 rounded shadow-sm ${l.type==='CREDIT'?'bg-green-100 text-green-700 border border-green-200':'bg-red-100 text-red-700 border border-red-200'}`}>{l.type}</span></td>
                                        <td className={`py-4 px-2 text-right font-black text-base ${l.type==='CREDIT'?'text-green-600':'text-red-600'}`}>₹ {l.amount}</td>
                                        <td className="py-4 px-2 text-sm font-bold text-slate-700">{l.remark}</td>
                                        <td className="py-4 px-2 text-right font-black text-slate-800">₹ {l.balanceAfter}</td>
                                        <td className="py-4 px-2 text-center"><button onClick={() => deleteTransact(l.id, l.amount, l.type)} className="text-slate-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition"><Icons.Trash/></button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );
    };

    // --- LEAVE PROTOCOL ---
    const LeaveProtocol = () => {
        const { setView } = useContext(AppContext);
        const [leave, setLeave] = useState(DB.getLeaveProto() || { logs: [] });
        
        const [activeMonth, setActiveMonth] = useState(new Date().toISOString().slice(0, 7));

        const addLog = () => { 
            const newLog = { id: Date.now(), date: `${activeMonth}-01`, type: 'Standard (Sun)', reason: '', duration: '', recovery: 'Unpaid' }; 
            const updated = { ...leave, logs: [newLog, ...(leave?.logs || [])] }; 
            DB.saveLeaveProto(updated); 
            setLeave(updated); 
        };
        
        const updateLog = (id, field, val) => { 
            const updated = { ...leave, logs: (leave?.logs || []).map(l => l.id === id ? { ...l, [field]: val } : l) }; 
            DB.saveLeaveProto(updated); 
            setLeave(updated); 
        };
        
        const deleteLog = (id) => { 
            if(!confirm("Delete this leave record permanently?")) return;
            const updated = { ...leave, logs: (leave?.logs || []).filter(l => l.id !== id) }; 
            DB.saveLeaveProto(updated); 
            setLeave(updated); 
        };

        const monthLogs = (leave?.logs || []).filter(l => l.date && l.date.startsWith(activeMonth));
        
        const downloadLeavePDF = () => {
            const rows = monthLogs.map(l => [l.date, l.type, l.reason, `${l.duration} Hrs`, l.recovery]);
            PDFSystem.generate(`Leave_Protocol_${activeMonth}`, `Absence & Leave Compliance Log`, ["Date", "Type", "Reason", "Duration", "Recovery"], rows, { Month: activeMonth, "Monthly Leaves": String(monthLogs.length) }, null, null, false);
        };

        const totalMonthlyUsed = monthLogs.length;
        const progress = Math.min((totalMonthlyUsed / 11) * 100, 100);

        return (
            <div className="min-h-screen bg-[#f8fafc] pb-24 font-sans text-slate-800 no-print">
                <div className="bg-white sticky top-0 z-40 p-4 shadow-sm border-b border-slate-200 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <button onClick={() => setView('management_system')} className="p-2 bg-amber-50 hover:bg-amber-100 text-amber-600 rounded-full transition"><Icons.Back /></button>
                        <div>
                            <h2 className="text-xl font-black text-slate-800 leading-tight">Leave Protocol</h2>
                            <p className="text-[10px] font-bold text-amber-500 uppercase tracking-widest">Monthly Grid Tracker</p>
                        </div>
                    </div>
                    <div className="flex gap-2 items-center">
                        <DepartmentNoticeBtn officeName="Leave Protocol" />
                        <button onClick={downloadLeavePDF} className="p-2 bg-slate-800 text-white rounded-xl hover:bg-slate-900 shadow-sm flex items-center justify-center transition hover:scale-105"><Icons.Pdf /></button>
                    </div>
                </div>

                <div className="p-4 space-y-8 mt-4 max-w-6xl mx-auto">
                    <DynamicFeatureRenderer location="Leave Protocol Top" />

                    <div className="bg-white p-8 md:p-10 rounded-3xl shadow-lg border border-slate-200 text-center relative overflow-hidden three-d-box">
                        <div className="absolute top-0 right-0 bg-red-600 text-white text-[10px] font-black px-5 py-2.5 rounded-bl-2xl tracking-widest shadow-md">ZERO LEAVE MANDATE</div>
                        
                        <div className="mb-8 flex justify-center">
                            <div className="bg-slate-50 p-2.5 rounded-2xl border border-slate-200 flex items-center gap-4 shadow-inner">
                                <span className="text-xs font-black text-slate-500 uppercase tracking-widest pl-3">Filter Month:</span>
                                <input type="month" className="bg-white border border-slate-300 p-2.5 rounded-xl outline-none font-black text-amber-700 focus:border-amber-500 shadow-sm cursor-pointer" value={activeMonth} onChange={(e) => { if(e.target.value) setActiveMonth(e.target.value) }} />
                            </div>
                        </div>

                        <h3 className="font-black text-7xl text-slate-900 tracking-tighter mb-2">{totalMonthlyUsed}<span className="text-4xl text-slate-300">/11</span></h3>
                        <p className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-10">LEAVES IN {new Date(activeMonth + '-01').toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase()} (CAP: 11 DAYS)</p>
                        
                        <div className="h-5 w-full max-w-2xl mx-auto bg-slate-100 rounded-full overflow-hidden mb-10 shadow-inner border border-slate-200 relative">
                            <div className={`h-full transition-all duration-1000 rounded-full ${progress > 80 ? 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]' : progress > 50 ? 'bg-orange-500 shadow-[0_0_10px_rgba(249,115,22,0.5)]' : 'bg-blue-600 shadow-[0_0_10px_rgba(37,99,235,0.5)]'}`} style={{width: `${progress}%`}}></div>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto">
                            <div className="bg-slate-50 border border-slate-200 p-6 rounded-2xl text-center shadow-sm">
                                <div className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">STANDARD</div>
                                <div className="text-sm font-black text-slate-800">Sundays Only (Max 3)</div>
                            </div>
                            <div className="bg-red-50 border border-red-200 p-6 rounded-2xl text-center shadow-sm">
                                <div className="text-[10px] font-black text-red-600 uppercase tracking-widest mb-2">EMERGENCY</div>
                                <div className="text-sm font-black text-red-900">10 Day Gap (Max 2)</div>
                            </div>
                            <div className="bg-blue-50 border border-blue-200 p-6 rounded-2xl text-center shadow-sm">
                                <div className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-2">ACADEMIC</div>
                                <div className="text-sm font-black text-blue-900">Exams Only</div>
                            </div>
                        </div>
                    </div>
                    <DynamicFeatureRenderer location="Leave Protocol Middle" />

                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-lg border border-slate-200 overflow-x-auto three-d-box">
                        <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-3">
                            <div>
                                <h3 className="font-black text-xl text-slate-800 uppercase tracking-wide">MONTHLY GRID LOG</h3>
                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Adding logs directly assigns to {activeMonth}</p>
                            </div>
                            <button onClick={addLog} className="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-widest shadow-md hover:bg-slate-900 transition hover:scale-105">+ Add Log</button>
                        </div>

                        <div className="space-y-4 min-w-[850px]">
                            <div className="grid grid-cols-[auto_130px_160px_1fr_100px_120px_auto] gap-4 bg-slate-100 p-4 rounded-xl border border-slate-200 text-[10px] font-black text-slate-600 uppercase tracking-widest items-center">
                                <div className="w-8 text-center">#</div>
                                <div>Exact Date</div>
                                <div>Leave Category</div>
                                <div>Detailed Reason</div>
                                <div className="text-center">Duration</div>
                                <div className="text-center">Recovery</div>
                                <div className="w-10"></div>
                            </div>

                            {monthLogs.length === 0 ? (
                                <div className="text-center py-12 bg-slate-50 rounded-2xl border border-dashed border-slate-300">
                                    <p className="text-sm font-bold text-slate-400 italic">No leaves recorded for this month.</p>
                                </div>
                            ) : monthLogs.map((l, i) => (
                                <div key={l.id} className="grid grid-cols-[auto_130px_160px_1fr_100px_120px_auto] gap-4 items-center bg-white p-3 rounded-xl border border-slate-200 shadow-sm hover:border-amber-300 transition group">
                                    <div className="w-8 text-center text-xs font-black text-slate-400">{i+1}</div>
                                    <div><input type="date" className="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-lg outline-none text-xs font-bold text-slate-800 uppercase focus:border-amber-400 shadow-inner cursor-pointer" value={l.date} onChange={e=>updateLog(l.id, 'date', e.target.value)} /></div>
                                    <div><select className="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-lg outline-none text-xs font-bold text-slate-800 focus:border-amber-400 shadow-inner cursor-pointer" value={l.type} onChange={e=>updateLog(l.id, 'type', e.target.value)}><option>Standard (Sun)</option><option>Emergency</option><option>Academic</option></select></div>
                                    <div><input className="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-lg outline-none text-xs font-semibold text-slate-800 focus:border-amber-400 shadow-inner" value={l.reason} onChange={e=>updateLog(l.id, 'reason', e.target.value)} placeholder="Type detailed reason..." /></div>
                                    <div><input type="number" className="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-lg outline-none text-xs font-black text-center text-slate-800 focus:border-amber-400 shadow-inner" value={l.duration} onChange={e=>updateLog(l.id, 'duration', e.target.value)} placeholder="Hrs" /></div>
                                    <div><select className={`w-full border p-2.5 rounded-lg outline-none text-[10px] font-black text-center uppercase tracking-widest shadow-inner cursor-pointer transition-colors ${l.recovery==='PAID'?'bg-green-50 text-green-700 border-green-200':'bg-red-50 text-red-600 border-red-200'}`} value={l.recovery} onChange={e=>updateLog(l.id, 'recovery', e.target.value)}><option value="Unpaid">UNPAID</option><option value="PAID">PAID</option></select></div>
                                    <div className="w-10 text-right"><button onClick={() => deleteLog(l.id)} className="text-slate-300 hover:text-red-500 bg-white hover:bg-red-50 p-2.5 rounded-lg transition border border-transparent hover:border-red-100"><Icons.Trash/></button></div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="mt-8 bg-slate-50 p-6 border-l-4 border-slate-800 rounded-r-2xl shadow-inner">
                            <h4 className="font-black text-xs text-slate-800 uppercase tracking-widest mb-2">DEBT REPAYMENT OATH</h4>
                            <p className="text-sm font-serif italic text-slate-600 leading-relaxed">"For every hour missed, I shall pay back 1.5x hours within 15 days. I certify that the above logs are true. Absence is a debt, not a right."</p>
                        </div>
                    </div>

                    <DynamicFeatureRenderer location="Leave Protocol Bottom" />
                </div>
            </div>
